# Netlify configuration, WealthWisers AI Labs website.
# Static site, no build step. Connect this repo in the Netlify UI for Git-based
# auto-deploy. Never put a token in this file or anywhere in the repo.

[build]
  publish = "."
  command = ""

# The contact form posts via client-side JS to a Google Apps Script web app
# (it writes a row to a Google Sheet). That endpoint URL is intentionally public
# in the page JS; no tokens or secrets live in this repo. No Netlify Forms.

# Serve the QR-destination contact page directly at /contact (no redirect hop).
[[redirects]]
  from = "/contact"
  to = "/contact/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/deck/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Hashed, self-hosted fonts for the captured demo case (safe to cache forever)
[[headers]]
  for = "/demo/cases/*/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
